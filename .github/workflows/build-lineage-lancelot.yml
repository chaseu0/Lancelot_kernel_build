name: Build boot.img for lancelot

on:
  workflow_dispatch:
    inputs:
      manifest_branch:
        description: "LineageOS/android manifest branch"
        required: true
        default: "lineage-20.0"
      device_branch:
        description: "Device and kernel branch"
        required: true
        default: "lineage-20"
      stock_rom_url:
        description: "Direct stock ROM archive URL used for blob extraction"
        required: true
        type: string
      runner_label:
        description: "Runner label. Hosted runners are space-constrained."
        required: true
        default: "ubuntu-22.04"
        type: string

permissions:
  contents: read

concurrency:
  group: lineage-lancelot-${{ github.ref }}-${{ github.event.inputs.manifest_branch }}-${{ github.event.inputs.device_branch }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner_label }}
    timeout-minutes: 1440
    env:
      MANIFEST_BRANCH: ${{ github.event.inputs.manifest_branch }}
      DEVICE_BRANCH: ${{ github.event.inputs.device_branch }}
      STOCK_ROM_URL: ${{ github.event.inputs.stock_rom_url }}
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Preserve local manifest
        run: |
          cp manifests/lancelot-lineage-20.xml "$RUNNER_TEMP/lancelot-lineage-20.xml"

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
        continue-on-error: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            adb \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            device-tree-compiler \
            flex \
            g++-multilib \
            gcc-multilib \
            git-lfs \
            gnupg \
            gperf \
            imagemagick \
            lib32ncurses5-dev \
            lib32readline-dev \
            lib32z1-dev \
            libelf-dev \
            libgl1-mesa-dev \
            liblz4-tool \
            libncurses5-dev \
            libsdl1.2-dev \
            libssl-dev \
            libxml2 \
            libxml2-utils \
            lld \
            lz4 \
            openjdk-11-jdk \
            pngcrush \
            python-is-python3 \
            rsync \
            schedtool \
            squashfs-tools \
            unzip \
            xz-utils \
            zip \
            zlib1g-dev

      - name: Install repo tool
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Initialize source tree
        run: |
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export BUILD_DIR="$WORK_ROOT/android"
          mkdir -p "$WORK_ROOT"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          repo init -u https://github.com/LineageOS/android.git -b "$MANIFEST_BRANCH" --git-lfs --depth=1 --partial-clone --clone-filter=blob:none
          mkdir -p .repo/local_manifests
          cp "$RUNNER_TEMP/lancelot-lineage-20.xml" .repo/local_manifests/lancelot.xml
          sed -i "s/__DEVICE_BRANCH__/$DEVICE_BRANCH/g" .repo/local_manifests/lancelot.xml

      - name: Sync sources
        run: |
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export BUILD_DIR="$WORK_ROOT/android"
          echo "Filesystem usage before repo sync:"
          df -h "$GITHUB_WORKSPACE" "$RUNNER_TEMP" /
          cd "$BUILD_DIR"
          repo sync -c --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j2

      - name: Download stock ROM
        run: |
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export STOCK_DIR="$WORK_ROOT/stock"
          mkdir -p "$STOCK_DIR"
          cd "$STOCK_DIR"
          curl -fL "$STOCK_ROM_URL" -o stock.rom
          if file stock.rom | grep -qi 'gzip'; then
            mv stock.rom stock.tgz
            tar -xzf stock.tgz
          else
            mv stock.rom stock.zip
            unzip -q stock.zip
          fi
          find "$STOCK_DIR" -maxdepth 3 -type f | sort

      - name: Build lpunpack host tool
        run: |
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export BUILD_DIR="$WORK_ROOT/android"
          cd "$BUILD_DIR"
          source build/envsetup.sh
          m lpunpack

      - name: Unpack stock images for blob extraction
        run: |
          set -euxo pipefail
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export BUILD_DIR="$WORK_ROOT/android"
          export STOCK_DIR="$WORK_ROOT/stock"
          export DUMP_DIR="$WORK_ROOT/system_dump"
          export PARTS_DIR="$WORK_ROOT/partitions"
          SUPER_IMG="$(find "$STOCK_DIR" -type f -name super.img | head -n 1)"
          if [ -z "$SUPER_IMG" ]; then
            echo "super.img not found in stock ROM archive"
            exit 1
          fi
          mkdir -p "$DUMP_DIR/system" "$PARTS_DIR"
          "$BUILD_DIR/out/host/linux-x86/bin/lpunpack" "$SUPER_IMG" "$PARTS_DIR"
          mount_if_present() {
            local image_name="$1"
            local mount_point="$2"
            local image_path="$PARTS_DIR/$image_name"
            if [ -f "$image_path" ]; then
              sudo mkdir -p "$mount_point"
              sudo mount -o loop,ro "$image_path" "$mount_point"
            fi
          }
          mount_if_present system.img "$DUMP_DIR/system"
          mount_if_present vendor.img "$DUMP_DIR/system/vendor"
          mount_if_present product.img "$DUMP_DIR/system/product"
          mount_if_present system_ext.img "$DUMP_DIR/system/system_ext"
          mount_if_present odm.img "$DUMP_DIR/system/odm"
          find "$DUMP_DIR" -maxdepth 2 -type d | sort

      - name: Extract proprietary blobs
        run: |
          set -euxo pipefail
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export BUILD_DIR="$WORK_ROOT/android"
          export DUMP_DIR="$WORK_ROOT/system_dump"
          cd "$BUILD_DIR"
          source build/envsetup.sh
          export LC_ALL=C
          ./device/xiaomi/mt6768-common/extract-files.sh "$DUMP_DIR"
          ./device/xiaomi/lancelot/extract-files.sh "$DUMP_DIR"

      - name: Build boot image
        run: |
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export BUILD_DIR="$WORK_ROOT/android"
          cd "$BUILD_DIR"
          source build/envsetup.sh
          lunch lineage_lancelot-userdebug
          m bootimage

      - name: Collect artifacts
        run: |
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          export BUILD_DIR="$WORK_ROOT/android"
          OUT_DIR="$BUILD_DIR/out/target/product/lancelot"
          ARTIFACT_DIR="$WORK_ROOT/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          cp "$OUT_DIR"/boot.img "$ARTIFACT_DIR"/
          (cd "$ARTIFACT_DIR" && sha256sum * > SHA256SUMS.txt)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boot-lancelot-${{ github.run_number }}
          path: ${{ github.workspace }}/work/artifacts
          if-no-files-found: error

      - name: Unmount extracted partitions
        if: always()
        run: |
          export WORK_ROOT="$GITHUB_WORKSPACE/work"
          sudo umount "$WORK_ROOT/system_dump/system/odm" || true
          sudo umount "$WORK_ROOT/system_dump/system/system_ext" || true
          sudo umount "$WORK_ROOT/system_dump/system/product" || true
          sudo umount "$WORK_ROOT/system_dump/system/vendor" || true
          sudo umount "$WORK_ROOT/system_dump/system" || true
